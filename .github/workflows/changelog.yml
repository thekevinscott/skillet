name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    # Skip for dependabot PRs. The `Skip-Changelog:` and `Skip-Migrations:` commit
    # trailers (checked inside the just recipes) are the only other escape hatches.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check changelog
        run: uv run just check-changelog origin/${{ github.base_ref }}

      - name: Check migrations
        run: uv run just check-migrations origin/${{ github.base_ref }}
